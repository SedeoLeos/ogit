name: ci

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      - name: Build Linux zip
        shell: pwsh
        run: ./scripts/build-zip.ps1

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ogit-linux-amd64
          path: dist/ogit-linux-amd64.zip
